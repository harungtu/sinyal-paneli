<html lang="tr">
<head>

content="bitcoin signal, btcusd signal, xauusd signal, gold signal, crypto signal, forex signal, live trading signals">

<title>Sinyal Paneli</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0D10;
    --panel:#12161A;
    --panel-line:#1C2127;
    --text:#E8ECEF;
    --text-dim:#5B6670;
    --buy:#1FCB7A;
    --sell:#FF4D5E;
    --mono:'JetBrains Mono', monospace;
    --sans:'Inter', sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--sans);
    min-height:100vh;
    padding:32px 20px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important;}
  }

  .wrap{
    max-width:880px;
    margin:0 auto;
  }

  .header-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:22px;
  }
  .title{
    font-family:var(--mono);
    font-size:14px;
    font-weight:600;
    letter-spacing:0.1em;
    color:var(--text-dim);
    text-transform:uppercase;
  }
  .clock{
    font-family:var(--mono);
    font-size:12px;
    color:var(--text-dim);
  }

  table{
    width:100%;
    border-collapse:collapse;
    background:var(--panel);
    border:1px solid var(--panel-line);
    border-radius:10px;
    overflow:hidden;
  }
  thead th{
    text-align:left;
    font-size:11px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--text-dim);
    font-weight:500;
    padding:14px 18px;
    border-bottom:1px solid var(--panel-line);
  }
  thead th.num{text-align:right;}

  thead th.sortable{
    cursor:pointer;
    user-select:none;
    transition:color 0.15s ease;
  }
  thead th.sortable:hover{color:var(--text);}
  thead th.sortable.active{color:var(--text);}
  thead th.sortable .sort-arrow{
    display:inline-block;
    margin-left:4px;
    font-size:10px;
    opacity:0;
  }
  thead th.sortable.active .sort-arrow{opacity:1;}

  tbody td{
    padding:16px 18px;
    border-bottom:1px solid var(--panel-line);
    font-family:var(--mono);
    font-size:15px;
    vertical-align:middle;
  }
  tbody tr:last-child td{border-bottom:none;}
  tbody tr{position:relative;}

  td.pair{
    font-family:var(--sans);
    font-weight:600;
    font-size:14.5px;
  }
  td.pair .sub{
    display:block;
    font-family:var(--mono);
    font-size:11px;
    color:var(--text-dim);
    font-weight:400;
    margin-top:2px;
  }

  .signal-pill{
    display:inline-flex;
    align-items:center;
    gap:6px;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.04em;
    padding:5px 10px;
    border-radius:6px;
  }
  .signal-pill.buy{color:var(--buy); background:rgba(31,203,122,0.1);}
  .signal-pill.sell{color:var(--sell); background:rgba(255,77,94,0.1);}
  .signal-pill .dot{width:6px; height:6px; border-radius:50%; background:currentColor;}

  td.time{color:var(--text-dim); font-size:13.5px;}
  td.num{text-align:right;}

  td.pl.pos{color:var(--buy); font-weight:600;}
  td.pl.neg{color:var(--sell); font-weight:600;}

  th.chart-col{width:100px;}
  td.chart-cell{padding:10px 18px;}
  .spark{
    display:block;
    width:90px;
    height:28px;
  }

  .footer-note{
    margin-top:16px;
    font-size:11.5px;
    color:var(--text-dim);
    text-align:center;
  }

  .error-row td{
    color:var(--sell);
    font-family:var(--mono);
    font-size:13px;
    text-align:center;
    padding:18px;
  }

  @media (max-width: 640px){
    table, thead, tbody, th, td, tr{display:block;}
    thead{display:none;}
    tbody tr{
      border-bottom:1px solid var(--panel-line);
      padding:14px 18px;
    }
    tbody tr:last-child{border-bottom:none;}
    tbody td{
      border-bottom:none;
      padding:5px 0;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }
    tbody td.num{text-align:right;}
    tbody td.chart-cell{justify-content:flex-end;}
    tbody td.chart-cell .spark{width:120px; height:32px;}
    tbody td::before{
      content:attr(data-label);
      font-family:var(--mono);
      font-size:10.5px;
      letter-spacing:0.06em;
      text-transform:uppercase;
      color:var(--text-dim);
    }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header-row">
    <span class="title">Sinyal paneli</span>
    <span class="clock" id="clock">--:--:--</span>
  </div>

  <table>
    <thead>
      <tr>
        <th class="sortable" data-sort-key="label">Parite<span class="sort-arrow"></span></th>
        <th class="sortable" data-sort-key="signal">Sinyal<span class="sort-arrow"></span></th>
        <th class="sortable" data-sort-key="since">Süre<span class="sort-arrow"></span></th>
        <th class="num sortable" data-sort-key="entry">Giriş<span class="sort-arrow"></span></th>
        <th class="num sortable" data-sort-key="price">Son Fiyat<span class="sort-arrow"></span></th>
        <th class="num sortable" data-sort-key="pl">K/Z<span class="sort-arrow"></span></th>
        <th class="num sortable" data-sort-key="pips">Pip<span class="sort-arrow"></span></th>
        <th class="chart-col">Grafik</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <tr><td colspan="8" style="text-align:center; color:var(--text-dim); font-family:var(--mono); font-size:13px; padding:24px;">Yükleniyor…</td></tr>
    </tbody>
  </table>

  <div class="footer-note">5 saniyede bir güncellenir · Binance Spot API · Bu sayfa yatırım tavsiyesi değildir</div>
</div>

<script>
const REFRESH_MS = 5000;

function fmtNum(n, decimals=2){
  if(n === null || n === undefined) return '—';
  return Number(n).toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}

function fmtDuration(sinceEpochSeconds){
  if(!sinceEpochSeconds) return '—';
  const diffSec = Math.max(0, Math.floor(Date.now()/1000 - sinceEpochSeconds));
  const d = Math.floor(diffSec / 86400);
  const h = Math.floor((diffSec % 86400) / 3600);
  const m = Math.floor((diffSec % 3600) / 60);
  if(d > 0) return `${d}g ${h}sa`;
  if(h > 0) return `${h}sa ${m}dk`;
  return `${m}dk`;
}

function updateClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('tr-TR');
}
setInterval(updateClock, 1000);
updateClock();

function buildSparkline(plHistory, isBuy){
  const w = 90, h = 28, pad = 2;
  if(!plHistory || plHistory.length < 2){
    return `<svg class="spark" viewBox="0 0 ${w} ${h}"></svg>`;
  }

  const min = Math.min(...plHistory, 0);
  const max = Math.max(...plHistory, 0);
  const range = (max - min) || 1;

  const xStep = (w - pad*2) / (plHistory.length - 1);
  const yOf = v => h - pad - ((v - min) / range) * (h - pad*2);
  const zeroY = yOf(0);

  const pts = plHistory.map((v,i) => `${(pad + i*xStep).toFixed(1)},${yOf(v).toFixed(1)}`).join(' ');
  const lastVal = plHistory[plHistory.length - 1];
  const lineColor = lastVal >= 0 ? 'var(--buy)' : 'var(--sell)';

  return `
    <svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <line x1="${pad}" y1="${zeroY.toFixed(1)}" x2="${w-pad}" y2="${zeroY.toFixed(1)}" stroke="var(--panel-line)" stroke-width="1" stroke-dasharray="2 2" />
      <polyline points="${pts}" fill="none" stroke="${lineColor}" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round" />
    </svg>
  `;
}

function renderRow(p){
  const isBuy = p.signal === 'BUY';
  const dirClass = isBuy ? 'buy' : 'sell';
  const plVal = p.pl || 0;
  const plClass = plVal >= 0 ? 'pos' : 'neg';
  const plSign = plVal >= 0 ? '+' : '';
  const pipsVal = p.pips || 0;
  const pipsClass = pipsVal >= 0 ? 'pos' : 'neg';
  const pipsSign = pipsVal >= 0 ? '+' : '';

  return `
    <tr>
      <td class="pair" data-label="Parite">${p.label}<span class="sub">${p.symbol}</span></td>
      <td data-label="Sinyal">
        <span class="signal-pill ${dirClass}"><span class="dot"></span>${isBuy ? 'BUY' : 'SELL'}</span>
      </td>
      <td class="time" data-label="Süre"${p.since_is_estimate ? ' title="Kesişim, elimizdeki geçmiş verinin dışında kalmış olabilir; bu süre bir alt sınırdır"' : ''}>${p.since_is_estimate ? '≥ ' : ''}${fmtDuration(p.since)}</td>
      <td class="num" data-label="Giriş">${p.entry ? fmtNum(p.entry) : '—'}</td>
      <td class="num" data-label="Son Fiyat">${p.price ? fmtNum(p.price) : '—'}</td>
      <td class="num pl ${plClass}" data-label="K/Z">${plSign}${fmtNum(plVal)}%</td>
      <td class="num pl ${pipsClass}" data-label="Pip">${pipsSign}${fmtNum(pipsVal, 0)}</td>
      <td class="chart-cell" data-label="Grafik">${buildSparkline(p.pl_history, isBuy)}</td>
    </tr>
  `;
}

function renderErrorRow(e){
  return `<tr class="error-row"><td colspan="8">${e.label}: ${e.error}</td></tr>`;
}

let lastPairs = [];
let lastErrors = [];
let sortKey = null;
let sortDir = 1; // 1 = büyükten küçüğe (yüksekten düşüğe), -1 = tersi

const SORT_GETTERS = {
  label: p => (p.label || '').toLowerCase(),
  signal: p => p.signal === 'BUY' ? 1 : 0,
  since: p => p.since || 0,
  entry: p => p.entry || 0,
  price: p => p.price || 0,
  pl: p => p.pl || 0,
  pips: p => p.pips || 0,
};

function applySort(pairs){
  if(!sortKey) return pairs;
  const getter = SORT_GETTERS[sortKey];
  const sorted = [...pairs];
  sorted.sort((a, b) => {
    const va = getter(a), vb = getter(b);
    if(typeof va === 'string') return sortDir * va.localeCompare(vb);
    return sortDir * (vb - va);
  });
  return sorted;
}

function updateSortHeaders(){
  document.querySelectorAll('th.sortable').forEach(th => {
    const key = th.dataset.sortKey;
    const arrow = th.querySelector('.sort-arrow');
    if(key === sortKey){
      th.classList.add('active');
      arrow.textContent = sortDir === 1 ? '▼' : '▲';
    } else {
      th.classList.remove('active');
      arrow.textContent = '';
    }
  });
}

function renderTable(){
  const tbody = document.getElementById('tableBody');
  let html = '';

  applySort(lastPairs).forEach(p => { html += renderRow(p); });
  lastErrors.forEach(e => { html += renderErrorRow(e); });

  if(!html){
    html = `<tr><td colspan="8" style="text-align:center; color:var(--text-dim); font-family:var(--mono); font-size:13px; padding:24px;">Veri yok</td></tr>`;
  }

  tbody.innerHTML = html;
  updateSortHeaders();
}

document.querySelectorAll('th.sortable').forEach(th => {
  th.addEventListener('click', () => {
    const key = th.dataset.sortKey;
    if(sortKey === key){
      sortDir *= -1;
    } else {
      sortKey = key;
      sortDir = 1;
    }
    renderTable();
  });
});

async function refresh(){
  try{
    const res = await fetch('/api');
    const data = await res.json();

    lastPairs = data.pairs || [];
    lastErrors = data.errors || [];

    renderTable();
  } catch(e){
    document.getElementById('tableBody').innerHTML =
      `<tr class="error-row"><td colspan="8">Sunucuya bağlanılamadı: ${e.message}</td></tr>`;
  }
}

refresh();
setInterval(refresh, REFRESH_MS);
</script>

</body>
</html>
